<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget Barber — Franchise Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --cream: #FAF8F5;
  --white: #FFFFFF;
  --sage: #7A9E7E;
  --sage-light: #EAF2EB;
  --sage-dark: #4A7150;
  --charcoal: #2C2C2A;
  --mid: #5F5E5A;
  --light: #B4B2A9;
  --border: #E8E6E1;
  --red: #C0392B;
  --red-light: #FDF0EE;
  --amber: #D4860B;
  --amber-light: #FDF3E3;
  --r: 14px;
  --rs: 9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: var(--white);
  border-radius: var(--r);
  border: 1px solid var(--border);
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
  width: 100%;
  max-width: 400px;
  overflow: hidden;
}

/* TOP */
.card-top {
  background: var(--sage-dark);
  padding: 28px 32px 24px;
  text-align: center;
}
.logo-icon {
  width: 48px; height: 48px;
  background: rgba(255,255,255,.15);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
}
.logo-icon svg { width: 24px; height: 24px; fill: var(--white); }
.card-top h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  font-weight: 400;
  color: var(--white);
  margin-bottom: 4px;
}
.card-top p {
  font-size: 12px;
  color: rgba(255,255,255,.5);
  letter-spacing: .04em;
  text-transform: uppercase;
}

/* BODY */
.card-body { padding: 28px 32px 32px; }

/* STEPS */
.step-wrap { display: none; }
.step-wrap.active { display: block; }

.field { margin-bottom: 18px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--mid);
  margin-bottom: 7px;
  letter-spacing: .03em;
  text-transform: uppercase;
}
.field input {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--rs);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--charcoal);
  background: var(--white);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
}
.field input:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(122,158,126,.12);
}
.field input::placeholder { color: var(--light); }

/* PIN ROW */
.pin-row { display: flex; gap: 8px; justify-content: space-between; }
.pin-digit {
  width: 100%;
  height: 52px;
  border: 1.5px solid var(--border);
  border-radius: var(--rs);
  font-family: 'DM Sans', sans-serif;
  font-size: 20px;
  font-weight: 600;
  text-align: center;
  color: var(--charcoal);
  background: var(--white);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
  -webkit-appearance: none;
  caret-color: transparent;
}
.pin-digit:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(122,158,126,.12);
}
.pin-digit.filled { background: var(--sage-light); border-color: #c5dcc8; }

.pin-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
  cursor: pointer;
  user-select: none;
}
.pin-toggle input[type=checkbox] { accent-color: var(--sage); width: 14px; height: 14px; }
.pin-toggle span { font-size: 12px; color: var(--mid); }

/* WELCOME BADGE */
.welcome-badge {
  background: var(--sage-light);
  border: 1px solid #c5dcc8;
  border-radius: var(--rs);
  padding: 14px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.wb-avatar {
  width: 40px; height: 40px;
  background: var(--sage);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  font-weight: 600;
  color: var(--white);
  flex-shrink: 0;
}
.wb-info h4 { font-size: 14px; font-weight: 500; color: var(--charcoal); margin-bottom: 2px; }
.wb-info p  { font-size: 12px; color: var(--mid); }

/* ERROR */
.err {
  background: var(--red-light);
  color: var(--red);
  border: 1px solid #f0c0bb;
  border-radius: var(--rs);
  padding: 10px 14px;
  font-size: 13px;
  margin-bottom: 18px;
  display: none;
  text-align: center;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: var(--rs);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background .2s, transform .1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:active { transform: scale(.99); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; }
.btn-primary { background: var(--sage-dark); color: var(--white); }
.btn-primary:hover:not(:disabled) { background: #3a5f40; }
.btn-back {
  background: none;
  color: var(--mid);
  border: 1.5px solid var(--border);
  margin-bottom: 12px;
  font-size: 13px;
  padding: 10px;
  width: auto;
}
.btn-back:hover { color: var(--charcoal); border-color: var(--charcoal); }

/* SPINNER */
.spin {
  width: 17px; height: 17px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* STEP INDICATOR */
.step-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}
.si-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: background .3s;
}
.si-dot.active { background: var(--sage); width: 24px; border-radius: 4px; }
.si-dot.done { background: var(--sage-dark); }

/* PHONE WITH PREFIX */
.phone-wrap {
  display: flex;
  align-items: center;
  border: 1.5px solid var(--border);
  border-radius: var(--rs);
  overflow: hidden;
  transition: border-color .2s, box-shadow .2s;
}
.phone-wrap:focus-within {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px rgba(122,158,126,.12);
}
.phone-prefix {
  padding: 11px 12px 11px 14px;
  background: var(--cream);
  border-right: 1.5px solid var(--border);
  font-size: 15px;
  font-weight: 500;
  color: var(--charcoal);
  white-space: nowrap;
  user-select: none;
  flex-shrink: 0;
}
.phone-wrap input {
  flex: 1;
  padding: 11px 14px;
  border: none;
  border-radius: 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  color: var(--charcoal);
  background: var(--white);
  outline: none;
  -webkit-appearance: none;
  min-width: 0;
}
.phone-wrap input::placeholder { color: var(--light); }
/* Override generic .field input styles for phone inside wrap */
.phone-wrap input:focus {
  border-color: transparent;
  box-shadow: none;
}

/* FOOTER */
.card-footer {
  border-top: 1px solid var(--border);
  padding: 16px 32px;
  text-align: center;
  font-size: 12px;
  color: var(--light);
}
.card-footer a { color: var(--charcoal); text-decoration: none; font-weight: 500; }
.card-footer a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/></svg>
    </div>
    <h1>Franchise Login</h1>
    <p>Budget Barber — Skin Analysis</p>
  </div>

  <div class="card-body">

    <!-- Step indicator -->
    <div class="step-indicator">
      <div class="si-dot active" id="dot1"></div>
      <div class="si-dot" id="dot2"></div>
    </div>

    <!-- ── STEP 1: Phone ── -->
    <div class="step-wrap active" id="step1">
      <div id="errBox1" class="err"></div>
      <div class="field">
        <label>Mobile Number</label>
        <div class="phone-wrap">
          <span class="phone-prefix">+91</span>
          <input
            type="tel"
            id="phone"
            placeholder="98765 43210"
            autocomplete="tel"
            inputmode="numeric"
            maxlength="10"
          >
        </div>
      </div>
      <button class="btn btn-primary" id="nextBtn" onclick="checkPhone()">
        <div class="spin" id="spin1"></div>
        <svg id="nextIcon" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        Continue
      </button>
    </div>

    <!-- ── STEP 2: PIN ── -->
    <div class="step-wrap" id="step2">
      <button class="btn btn-back" onclick="goBack()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>

      <div id="welcomeBadge" class="welcome-badge">
        <div class="wb-avatar" id="wbInitials">?</div>
        <div class="wb-info">
          <h4 id="wbName">Welcome back</h4>
          <p id="wbLocation"></p>
        </div>
      </div>

      <div id="errBox2" class="err"></div>

      <div class="field">
        <label>6-Digit PIN</label>
        <div class="pin-row" id="pinRow">
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="0">
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="1">
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="2">
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="3">
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="4">
          <input class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]" data-idx="5">
        </div>
        <label class="pin-toggle">
          <input type="checkbox" id="showPin" onchange="togglePinViz()">
          <span>Show PIN</span>
        </label>
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">
        <div class="spin" id="spin2"></div>
        <svg id="loginIcon" viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
        Sign In
      </button>
    </div>

  </div>

  <div class="card-footer">
    Admin? <a href="admin-login.html">Admin login here</a>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG — fill these in
// ══════════════════════════════════════════
const SUPABASE_URL  = 'https://uottuqqttklxcesxhijw.supabase.co';
const SUPABASE_ANON = 'sb_publishable_SFPzqaiDkGN_BUonCsL9Kw_p5yiZWrk';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ── State ──────────────────────────────────
let foundCustomer = null;

// ── PIN input wiring ──────────────────────
const digits = document.querySelectorAll('.pin-digit');

digits.forEach((el, i) => {
  el.type = 'password'; // hidden by default, revealed by "Show PIN" checkbox

  el.addEventListener('keydown', e => {
    if (e.key === 'Backspace') {
      if (el.value) {
        el.value = '';
        el.classList.remove('filled');
      } else if (i > 0) {
        digits[i-1].focus();
        digits[i-1].value = '';
        digits[i-1].classList.remove('filled');
      }
      e.preventDefault();
      return;
    }
    if (e.key === 'ArrowLeft'  && i > 0) { digits[i-1].focus(); return; }
    if (e.key === 'ArrowRight' && i < 5) { digits[i+1].focus(); return; }
    if (e.key === 'Enter') { doLogin(); return; }
  });

  el.addEventListener('input', e => {
    const val = e.target.value.replace(/\D/g,'').slice(-1);
    el.value = val;
    if (val) {
      el.classList.add('filled');
      if (i < 5) digits[i+1].focus();
    } else {
      el.classList.remove('filled');
    }
  });

  el.addEventListener('paste', e => {
    e.preventDefault();
    const pasted = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
    pasted.split('').forEach((ch, j) => {
      if (digits[j]) { digits[j].value = ch; digits[j].classList.add('filled'); }
    });
    digits[Math.min(pasted.length, 5)].focus();
  });
});

function getPin() { return Array.from(digits).map(d => d.value).join(''); }

// Show PIN: checkbox checked = show digits, unchecked = hide (password)
function togglePinViz() {
  const show = document.getElementById('showPin').checked;
  digits.forEach(d => { d.type = show ? 'text' : 'password'; });
}

// ── Phone helpers ─────────────────────────
// Customer enters 10 digits only — we prepend +91 for Supabase lookup
function buildFullPhone(input) {
  const digits10 = input.replace(/\D/g, '').slice(0, 10);
  return '+91' + digits10;
}

function validatePhone(input) {
  const d = input.replace(/\D/g, '');
  if (d.length !== 10)        return 'Please enter a valid 10-digit mobile number.';
  if (!/^[6-9]/.test(d))     return 'Mobile number must start with 6, 7, 8 or 9.';
  return null;
}

// ── Helpers ───────────────────────────────
function showErr(step, msg) {
  const el = document.getElementById('errBox' + step);
  el.textContent = msg;
  el.style.display = 'block';
}
function hideErr(step) {
  document.getElementById('errBox' + step).style.display = 'none';
}

function setLoading(btnId, spinId, iconId, on) {
  document.getElementById(btnId).disabled = on;
  document.getElementById(spinId).style.display = on ? 'block' : 'none';
  document.getElementById(iconId).style.display = on ? 'none' : 'block';
}

// ── Step dots ─────────────────────────────
function setDots(step) {
  document.getElementById('dot1').className = 'si-dot ' + (step===1 ? 'active' : 'done');
  document.getElementById('dot2').className = 'si-dot ' + (step===2 ? 'active' : '');
}

// ── STEP 1: Check phone exists ─────────────
async function checkPhone() {
  hideErr(1);
  const raw = document.getElementById('phone').value.trim();

  const validationErr = validatePhone(raw);
  if (validationErr) { showErr(1, validationErr); return; }

  const fullPhone = buildFullPhone(raw);
  setLoading('nextBtn','spin1','nextIcon', true);

  try {
    const { data, error } = await sb
      .from('bb_customers')
      .select('id, name, location, status, pin')
      .eq('phone', fullPhone)
      .single();

    if (error || !data) {
      showErr(1, 'No account found for this number. Please contact your admin.');
      return;
    }
    if (data.status !== 'active') {
      showErr(1, 'Your account is inactive. Please contact Budget Barber admin.');
      return;
    }
    if (!data.pin) {
      showErr(1, 'No PIN set for this account. Please contact admin to set your PIN.');
      return;
    }

    foundCustomer = data;

    // Show welcome badge
    const initials = data.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    document.getElementById('wbInitials').textContent  = initials;
    document.getElementById('wbName').textContent      = data.name;
    document.getElementById('wbLocation').textContent  = data.location || 'Franchise Owner';

    // Switch to step 2
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    setDots(2);
    digits[0].focus();

  } catch(e) {
    showErr(1, 'Error: ' + e.message);
  } finally {
    setLoading('nextBtn','spin1','nextIcon', false);
  }
}

// ── STEP 2: Verify PIN ────────────────────
async function doLogin() {
  hideErr(2);
  const pin = getPin();
  if (pin.length !== 6) { showErr(2, 'Please enter all 6 digits of your PIN.'); return; }

  setLoading('loginBtn','spin2','loginIcon', true);

  try {
    if (pin !== foundCustomer.pin) {
      showErr(2, 'Incorrect PIN. Please try again.');
      digits.forEach(d => { d.value=''; d.classList.remove('filled'); });
      digits[0].focus();
      return;
    }

    // Success — store session
    sessionStorage.setItem('bb_customer_auth', JSON.stringify({
      role: 'customer',
      id: foundCustomer.id,
      name: foundCustomer.name,
      location: foundCustomer.location,
      loginAt: Date.now()
    }));
    window.location.href = 'budget-barber-customer.html';

  } catch(e) {
    showErr(2, 'Login error: ' + e.message);
  } finally {
    setLoading('loginBtn','spin2','loginIcon', false);
  }
}

function goBack() {
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
  hideErr(1);
  hideErr(2);
  digits.forEach(d => { d.value=''; d.classList.remove('filled'); });
  foundCustomer = null;
  setDots(1);
}

// ── Phone enter key ────────────────────────
document.getElementById('phone').addEventListener('keydown', e => {
  if (e.key === 'Enter') { checkPhone(); return; }
  // Allow: backspace, delete, arrows, tab, home, end
  const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Tab','Home','End'];
  if (allowed.includes(e.key)) return;
  // Block anything that isn't a digit
  if (!/^[0-9]$/.test(e.key)) e.preventDefault();
});

// Strip non-digits on paste
document.getElementById('phone').addEventListener('paste', e => {
  e.preventDefault();
  const pasted = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,10);
  document.getElementById('phone').value = pasted;
});

// ── Guard: redirect if already logged in ──
if (sessionStorage.getItem('bb_customer_auth')) {
  window.location.href = 'budget-barber-customer.html';
}

document.getElementById('phone').focus();
</script>
</body>
</html>
